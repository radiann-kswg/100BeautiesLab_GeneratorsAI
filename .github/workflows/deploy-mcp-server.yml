name: Deploy MCP Server to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - "src/pipeline/**"
      - "src/mcp_server/**"
      - "src/utils/**"
      - "requirements.txt"
      - "requirements-mcp.txt"
      - "Dockerfile"
      - ".github/workflows/deploy-mcp-server.yml"
      - "_creations-ai"
  workflow_dispatch:  # GitHub UI から手動実行できるようにする

env:
  PROJECT_ID: claude-radiannkswg
  REGION: asia-northeast1
  SERVICE: generators-ai
  IMAGE: asia-northeast1-docker.pkg.dev/claude-radiannkswg/numbertales-mcp/numbertales-mcp

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Workload Identity Federation に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── GCP 認証 (Workload Identity Federation) ─────────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      # ── Docker: Artifact Registry 認証 ──────────────────────────
      # gcloud credential helper を使わず access token を直接渡す
      - name: Docker login to Artifact Registry
        run: |
          echo "${{ steps.auth.outputs.access_token }}" \
            | docker login \
                --username oauth2accesstoken \
                --password-stdin \
                asia-northeast1-docker.pkg.dev

      # ── Docker イメージビルド & プッシュ ────────────────────────
      - name: Build and push Docker image
        run: |
          docker build \
            --tag "${{ env.IMAGE }}:${{ github.sha }}" \
            --tag "${{ env.IMAGE }}:latest" \
            .
          docker push "${{ env.IMAGE }}:${{ github.sha }}"
          docker push "${{ env.IMAGE }}:latest"

      # ── gcloud SDK セットアップ (deploy-cloudrun 用) ─────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: claude-radiannkswg

      # ── Cloud Run デプロイ ───────────────────────────────────────
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          flags: >-
            --port=8080
            --allow-unauthenticated
            --min-instances=1
            --max-instances=1
            --memory=1Gi
            --timeout=3600
          env_vars: |
            MCP_TRANSPORT=streamable-http
            OUTPUT_SINK=drive
            MCP_ISSUER_URL=https://generators-ai-amotdscyfq-an.a.run.app
          secrets: |
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            OPENAI_API_KEY=OPENAI_API_KEY:latest

      - name: Show deployed URL
        run: |
          echo "MCP server deployed!"
          echo "Cloud Run URL: $(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format='value(status.url)')"
